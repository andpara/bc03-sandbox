- name: Hello world
  hosts: xubuntu-desktop
  gather_facts: yes
  become: yes
  roles:
    - name: user-access
      user_access_username: user
      user_access_password: Password123
      user_access_sudo: True
      
  tasks:
    - name: Print message
      debug:
        msg: "installing gns3 ..."
        
    - name: Install GNS3 repository
      apt_repository:
        repo: ppa:gns3/ppa
        state: present
    
    - name: Update apt cache
      apt:
        update_cache: yes
    
    - name: Install GNS3
      apt:
        name:
          - gns3-gui
          - gns3-server
        state: present
