---
- name: Configure GNS3 and Xubuntu Desktop for Trainee
  hosts: xubuntu-desktop
  gather_facts: yes
  become: yes

  vars:
    # Target username
    target_user: trainee

  roles:
    - name: user-access
      user_access_username: "{{ target_user }}"
      user_access_password: btcmp03
      user_access_sudo: true

  tasks:
    # 1. AccountsService configuration
    - name: Hide system account in login screen
      ansible.builtin.copy:
        content: |
          [User]
          SystemAccount=true
        dest: "/var/lib/AccountsService/users/ubuntu"
        mode: '0644'

    # 2. Remove colord
    - name: Purge colord package
      ansible.builtin.apt:
        name: colord
        state: absent
        purge: true

    # 3. Apply high-DPI scaling
    - name: Set XFCE DPI to 160
      ansible.builtin.shell: |
        dbus-launch xfconf-query -c xsettings -p /Xft/DPI -s 160
      become_user: "{{ target_user }}"
      changed_when: true
      failed_when: false

    # 4. Automate silent software installation prompts
    - name: Preseed Debconf answers for GNS3 and Wireshark
      ansible.builtin.debconf:
        name: "{{ item.name }}"
        question: "{{ item.question }}"
        vtype: boolean
        value: "true"
      loop:
        - { name: 'wireshark-common', question: 'wireshark-common/install-setuid' }
        - { name: 'gns3-server', question: 'gns3-server/capture-users-group-error' }
        - { name: 'ubridge', question: 'ubridge/ubridge-suid' }

    # 5. Connect GNS3 repository
    - name: Add GNS3 PPA repository
      ansible.builtin.apt_repository:
        repo: ppa:gns3/ppa
        state: present
        update_cache: true

    # 6. Install hypervisor layers and application bundle
    - name: Install KVM, Libvirt, and GNS3 packages
      ansible.builtin.apt:
        name:
          - qemu-kvm
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - gns3-gui
          - gns3-server
        state: present
        update_cache: true
        dpkg_options: 'force-confdef,force-confold'

    # 7. Enable non-root packet links (SUID 4755)
    - name: Change ubridge permissions
      ansible.builtin.file:
        path: /usr/bin/ubridge
        mode: '4755'

    # 8. Handle graphical desktop entry points
    - name: Create Desktop directory for trainee
      ansible.builtin.file:
        path: "/home/{{ target_user }}/Desktop"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'

    - name: Copy GNS3 desktop shortcut to trainee Desktop
      ansible.builtin.copy:
        src: /usr/share/applications/gns3.desktop
        dest: "/home/{{ target_user }}/Desktop/gns3.desktop"
        remote_src: true
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'

    # 9. Elevate profile virtualization & capture capabilities
    - name: Add trainee to required groups
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups: libvirt,ubridge,wireshark,kvm
        append: true

    # 10. Create base GNS3 directory structure for the trainee profile
    - name: Create GNS3 directory in trainee home
      ansible.builtin.file:
        path: "/home/{{ target_user }}/GNS3"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'
    
    - name: List contents of /opt/gns3/images
      shell: |
        if [ -d /opt/gns3/images ]; then
          find /opt/gns3/images
        else
          echo "DIRECTORY NOT FOUND"
        fi
      register: opt_images_listing
      changed_when: false
    
    - name: Print /opt/gns3/images contents
      debug:
        msg: "{{ opt_images_listing.stdout_lines }}"


    - name: List contents of trainee GNS3 images
      shell: |
        if [ -d /home/{{ target_user }}/GNS3/images ]; then
          find /home/{{ target_user }}/GNS3/images
        else
          echo "DIRECTORY NOT FOUND"
        fi
      register: home_images_listing
      changed_when: false
    
    - name: Print trainee GNS3 images contents
      debug:
        msg: "{{ home_images_listing.stdout_lines }}"        

    # 11. Locate the source folder to verify its existence
    - name: Check source location
      stat:
        path: /opt/gns3/images
      register: images_in_opt
    
    - name: Check destination location
      stat:
        path: /home/{{ target_user }}/GNS3/images
      register: images_in_home

    # 12. Hard stop if the images directory is completely missing
    - name: Fail if images are missing
      fail:
        msg: >
          Fatal: GNS3 images were not found in either
          /opt/gns3/images or /home/{{ target_user }}/GNS3/images.
          Stopping playbook execution.
      when:
        - not images_in_opt.stat.exists
        - not images_in_home.stat.exists

    # 13. Move images to the target trainee profile folder
    - name: Move GNS3 images to trainee home directory
      command:
        cmd: mv /opt/gns3/images /home/{{ target_user }}/GNS3/
      when:
        - images_in_opt.stat.exists
        - not images_in_home.stat.exists
      changed_when: true

    # 14. Fix file permissions recursively for the trainee profile
    - name: Ensure correct ownership of GNS3 images
      file:
        path: "/home/{{ target_user }}/GNS3/images"
        state: directory
        recurse: true
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

- name: Set up command logging
  hosts: xubuntu-desktop
  become: yes
  roles:
    - role: sandbox-logging
      slf_destination_port: '{% if hostvars["man"] is defined -%} 514 {%- else -%} 515 {%- endif %}'
