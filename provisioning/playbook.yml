---
- name: Configure GNS3 and Xubuntu Desktop for Trainee
  hosts: xubuntu-desktop
  gather_facts: yes
  become: yes

  vars:
    # Target username
    target_user: trainee

  roles:
    - name: user-access
      user_access_username: "{{ target_user }}"
      user_access_password: btcmp03
      user_access_sudo: true

  tasks:
    # 1. AccountsService configuration
    - name: Hide system account in login screen
      ansible.builtin.copy:
        content: |
          [User]
          SystemAccount=true
        dest: "/var/lib/AccountsService/users/ubuntu"
        mode: '0644'

    # 2. Apply high-DPI scaling
    - name: Set XFCE DPI to 170
      become_user: "{{ target_user }}"
      ansible.builtin.command:
        cmd: dbus-launch xfconf-query -c xsettings -p /Xft/DPI -s 170 --create -t int   

    # 3. Automate silent software installation prompts
    - name: Preseed Debconf answers for GNS3 and Wireshark
      ansible.builtin.debconf:
        name: "{{ item.name }}"
        question: "{{ item.question }}"
        vtype: boolean
        value: "true"
      loop:
        - { name: 'wireshark-common', question: 'wireshark-common/install-setuid' }
        - { name: 'gns3-server', question: 'gns3-server/capture-users-group-error' }
        - { name: 'ubridge', question: 'ubridge/ubridge-suid' }

    # 4. Connect GNS3 repository
    - name: Add GNS3 PPA repository
      ansible.builtin.apt_repository:
        repo: ppa:gns3/ppa
        state: present
        update_cache: true

    # 5. Install hypervisor layers and application bundle
    - name: Install KVM, Libvirt, and GNS3 packages
      ansible.builtin.apt:
        name:
          - qemu-kvm
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - gns3-gui
          - gns3-server
        state: present
        update_cache: true
        dpkg_options: 'force-confdef,force-confold'

    # 6. Enable non-root packet links (SUID 4755)
    - name: Change ubridge permissions
      ansible.builtin.file:
        path: /usr/bin/ubridge
        mode: '4755'

    # 7. Handle graphical desktop entry points
    - name: Create Desktop directory for trainee
      ansible.builtin.file:
        path: "/home/{{ target_user }}/Desktop"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'

    - name: Copy GNS3 desktop shortcut to trainee Desktop
      ansible.builtin.copy:
        src: /usr/share/applications/gns3.desktop
        dest: "/home/{{ target_user }}/Desktop/gns3.desktop"
        remote_src: true
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'

    - name: Force Xfce to trust the GNS3 desktop shortcut
      ansible.builtin.shell: |
        FILE="/home/{{ target_user }}/Desktop/gns3.desktop"
        CHECKSUM=$(sha256sum "$FILE" | awk '{print $1}')
        dbus-run-session gio set -t string "$FILE" metadata::xfce-exe-checksum "$CHECKSUM"
      become: yes
      become_user: "{{ target_user }}"
      changed_when: false

    # 8. Elevate profile virtualization & capture capabilities
    - name: Add trainee to required groups
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups: libvirt,ubridge,wireshark,kvm
        append: true

    # 9. Disable Colord Authentication Login Popups
    - name: Create Polkit rule to disable colord password prompts
      ansible.builtin.copy:
        content: |
          polkit.addRule(function(action, subject) {
              if ((action.id == "org.freedesktop.color-manager.create-device" ||
                   action.id == "org.freedesktop.color-manager.create-profile" ||
                   action.id == "org.freedesktop.color-manager.delete-device" ||
                   action.id == "org.freedesktop.color-manager.delete-profile" ||
                   action.id == "org.freedesktop.color-manager.modify-device" ||
                   action.id == "org.freedesktop.color-manager.modify-profile") &&
                  subject.isInGroup("{{ target_user }}")) {
                  return polkit.Result.YES;
              }
          });
        dest: "/etc/polkit-1/rules.d/45-allow-colord.rules"
        mode: '0644'

    # 10. Verify existence of source and destination folders
    - name: Check source location of GNS3 data
      ansible.builtin.stat:
        path: /opt/trainee/GNS3
      register: images_in_opt
    
    - name: Check destination location of GNS3 data
      ansible.builtin.stat:
        path: /home/{{ target_user }}/GNS3
      register: images_in_home

    - name: Check source location of GNS3 config
      ansible.builtin.stat:
        path: /opt/trainee/.config/GNS3
      register: config_in_opt

    - name: Check destination location of GNS3 configuration
      ansible.builtin.stat:
        path: /home/{{ target_user }}/.config/GNS3
      register: config_in_home

    # 11. Hard stop if the images directory is completely missing
    - name: Fail if images are missing
      ansible.builtin.fail:
        msg: >
          Fatal: GNS3 images were not found in either
          /opt/trainee/GNS3 or /home/{{ target_user }}/GNS3.
          Stopping playbook execution.
      when:
        - not images_in_opt.stat.exists
        - not images_in_home.stat.exists

    # 12. Move images and configuration to the target trainee profile folder
    - name: Move GNS3 project to trainee home directory
      ansible.builtin.command:
        cmd: mv /opt/trainee/GNS3 /home/{{ target_user }}/
      when:
        - images_in_opt.stat.exists
        - not images_in_home.stat.exists
      changed_when: true

    - name: Ensure target .config directory exists
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.config"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'
      when:
        - config_in_opt.stat.exists

    - name: Move GNS3 configuration to trainee home directory
      ansible.builtin.command:
        cmd: mv /opt/trainee/.config/GNS3 /home/{{ target_user }}/.config/
      when:
        - config_in_opt.stat.exists
        - not config_in_home.stat.exists
      changed_when: true      

    # 13. Fix file permissions recursively for the trainee profile
    - name: Ensure correct ownership of GNS3 project directory
      ansible.builtin.file:
        path: "/home/{{ target_user }}/GNS3"
        state: directory
        recurse: true
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Ensure correct ownership of GNS3 trainee config directory
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.config/GNS3"
        state: directory
        recurse: true
        owner: "{{ target_user }}"
        group: "{{ target_user }}"        

- name: Set up command logging
  hosts: xubuntu-desktop
  become: yes
  roles:
    - role: sandbox-logging
      slf_destination_port: '{% if hostvars["man"] is defined -%} 514 {%- else -%} 515 {%- endif %}'
