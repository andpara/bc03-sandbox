name: xubuntu-noble-testing

hosts:
  - name: xubuntu-desktop
    base_box: 
      image: xubuntu-noble-x86_64
      mgmt_user: ubuntu
    flavor: c4_r8_d60

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

networks:
  - name: network
    cidr: 10.0.0.0/24

wan:
  name: internet-connection
  cidr: 100.100.100.0/24

net_mappings:
    - host: xubuntu-desktop
      network: network
      ip: 10.0.0.10

router_mappings:
    - router: router
      network: network
      ip: 10.0.0.1

groups:
  - name: monitor-os
    nodes:
      - xubuntu-desktop
      - router

monitoring_targets:
  tcp:
    - node: xubuntu-desktop
      targets:
        - port: 22
          address: 10.0.0.10
    - node: router
      targets:
        - port: 80
          interface: ens3

  icmp:
    - node: xubuntu-desktop
      targets:
        - address: 10.0.0.10
    - node: router
      targets:
        - address: 10.0.0.1
  http:
    targets:
      - port: 22
        interface: ens3
      - url: https://example.com
        check_string: "test"
      - url: http://10.0.0.10:8080/status
